<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MKC Lounge Stats (切り抜き)</title>
<style>
  body {
    background-color: #1a1a1a;
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
  }

  .crop-window {
    width: 950px;
    height: 110px;
    overflow: hidden;
    position: relative;
    border: 3px solid #ff4d4d; /* 目印の赤い枠線 */
    border-radius: 8px;
    background-color: #222; 
  }

  .crop-window iframe {
    position: absolute;
    width: 1200px;
    height: 2000px;
    border: none;
    
    /* 
      ★★ここを書き換えて調整してください★★ 
      自動で文字を探せないため、この数字を書き換えて「Event」の文字に合わせます。
    */
    top: -550px;   /* 【縦の調整】 -600px にすると「下」へ、-500px にすると「上」へズレます */
    left: -125px;  /* 【横の調整】 -150px にすると「右」へ、-100px にすると「左」へズレます */
  }

  /* iPadの画面に収まらない場合は、この 1.0 を 0.8 などに小さくしてください */
  .scale-wrapper {
    transform: scale(1.0); 
    transform-origin: top center;
  }
</style>
</head>
<body>

<div class="scale-wrapper">
  <!-- 赤い枠の窓 -->
  <div class="crop-window">
    <iframe src="https://lounge.mkcentral.com/mk8dx/PlayerDetails/43935?season=15" scrolling="no"></iframe>
  </div>
</div>

<script>
  // 3分ごとに自動で最新のデータに更新
  setInterval(() => {
    location.reload();
  }, 180000);
</script>

</body>
</html>
