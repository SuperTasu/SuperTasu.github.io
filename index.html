<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Link First</title>
  <link rel="icon" href="./icon.png" type="image/png">
  <link rel="apple-touch-icon" href="./icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
  <!-- 外部CSSの読み込み -->
  <link rel="stylesheet" href="style.css">
  <style>
    /* 日付・時計・タブの配置の調整 */
    .datetime-row {
        display: flex;
        align-items: center;
        gap: 15px;
        flex-grow: 1;
    }
    
    @media (max-width: 768px) {
        .datetime-row {
            flex-wrap: wrap;
            gap: 10px;
        }
    }
  </style>
</head>
<body>
  <div class="fixed-top-wrapper">
    <div class="clock-area">
        <div class="clock-main-row">
            <div class="left-section" style="display: flex; align-items: center; flex-grow: 1;">
                <img src="./icon.png" alt="Link First Logo" class="site-logo">
                <div class="datetime-row">
                    <div id="custom-date"></div>
                    <div id="custom-clock"></div>
                    
                    <!-- ヘッダータブ -->
                    <nav class="header-nav">
                        <div class="tab-item" id="tab-all-apps" onclick="activateTab('all-apps')"> 
                            <i class="fas fa-th-large"></i> <span>Apps</span> 
                        </div>
                        <div class="tab-item active" id="tab-fy" onclick="activateTab('fy')"> 
                            <i class="fas fa-home fy-icon"></i> <span>Home</span> 
                        </div>
                        <div class="tab-item" id="tab-bustarain" onclick="activateTab('bustarain')"> 
                            <i class="fas fa-bus"></i> <span>Traffic</span> 
                        </div>
                        <div class="tab-item" id="tab-memo" onclick="activateTab('memo')"> 
                            <i class="fas fa-pen-alt"></i> <span>Memo</span> 
                        </div>
                        
                        <!-- Home埋め込み (Memoの隣、0.65倍スケールで切り抜き) -->
                        <div class="header-home-embed">
                            <iframe src="https://statsoverlay.prismillon.com/?name=FY%20Tasu" scrolling="no" title="Home Stats"></iframe>
                        </div>
                    </nav>

                </div>
            </div>
             <div class="header-controls">
                <!-- Theme Switcher -->
                <div class="theme-switcher">
                    <div class="theme-dot light" onclick="setTheme('light')" title="Light Mode"></div>
                    <div class="theme-dot dark" onclick="setTheme('dark')" title="Dark Mode"></div>
                </div>
                <!-- Network & Refresh -->
                <div id="network-status" class="online" title="オンライン"><i class="fas fa-wifi"></i> <span>ON</span></div>
                <div class="control-icon" id="refresh-button" onclick="location.reload()"><i class="fas fa-sync-alt"></i></div>
                <!-- SpeedTest PC -->
                <div class="header-speed-test" id="header-speed-test-container">
                    <iframe id="speed-test-iframe" src="https://fast.com/ja/" title="速度テスト" loading="lazy" scrolling="no"></iframe>
                    <div class="control-icon" id="speed-test-refresh-button" onclick="reloadSpeedTest()"><i class="fas fa-redo"></i></div>
                </div>
            </div>
        </div>
    </div>
  </div>

  <div class="page-container">
      <div id="fy-container" style="display: block;"></div>

    <!-- メインアプリ一覧 -->
    <div class="main-grid" id="main-grid" style="display: none;">
        <div id="all-apps-container">
            <h3 class="section-title">すべてのアプリ</h3>

            <!-- アプリのリスト (以前の横長カード型に戻しました) -->
            <div class="grid-container" id="gridContainer">
                <a href="https://www.google.com" target="_blank" class="app-card">
                    <div class="card-left"><i class="fab fa-google" style="color: #4285F4;"></i></div>
                    <div class="card-divider"></div>
                    <div class="card-right"><div class="card-title">Google</div></div>
                </a>
                <a href="https://www.youtube.com" target="_blank" class="app-card">
                    <div class="card-left"><i class="fab fa-youtube" style="color: #FF0000;"></i></div>
                    <div class="card-divider"></div>
                    <div class="card-right"><div class="card-title">YouTube</div></div>
                </a>
                <a href="https://x.com" target="_blank" class="app-card">
                    <div class="card-left"><i class="fab fa-twitter" style="color: #1DA1F2;"></i></div>
                    <div class="card-divider"></div>
                    <div class="card-right"><div class="card-title">X (Twitter)</div></div>
                </a>
                <a href="https://github.com" target="_blank" class="app-card">
                    <div class="card-left"><i class="fab fa-github" style="color: var(--text-color-primary);"></i></div>
                    <div class="card-divider"></div>
                    <div class="card-right"><div class="card-title">GitHub</div></div>
                </a>
            </div>
        </div>
    </div>

    <!-- Bustarain (交通) コンテナ -->
    <div id="bustarain-container" style="display: none;">
        <iframe src="Bustarain/B-train.html" style="width: 100%; height: calc(100vh - 130px); border: none; border-radius: 12px; background: transparent;"></iframe>
    </div>

    <!-- メモ帳 コンテナ -->
    <div id="memo-container" style="display: none;">
        <h3 class="section-title"><i class="fas fa-sticky-note"></i> メモ帳 (Auto Save)</h3>
        <textarea id="memo-pad" placeholder="ここにメモを入力..."></textarea>
        <div id="memo-status"></div>
    </div>
  </div>
  
  <script type="module" src="script.js"></script>
  <script>
      function updateDateTime() {
          const now = new Date();
          const dateEl = document.getElementById('custom-date');
          const clockEl = document.getElementById('custom-clock');
          
          if (dateEl) {
              const year = now.getFullYear();
              const month = String(now.getMonth() + 1).padStart(2, '0');
              const date = String(now.getDate()).padStart(2, '0');
              const days =['日', '月', '火', '水', '木', '金', '土'];
              const day = days[now.getDay()];
              dateEl.textContent = `${year}/${month}/${date}(${day})`;
          }
          if (clockEl) {
              const hours = String(now.getHours()).padStart(2, '0');
              const minutes = String(now.getMinutes()).padStart(2, '0');
              const seconds = String(now.getSeconds()).padStart(2, '0');
              clockEl.textContent = `${hours}:${minutes}:${seconds}`;
          }
      }
      setInterval(updateDateTime, 1000);
      updateDateTime(); 

      document.addEventListener('DOMContentLoaded', () => {
          activateTab('fy');
      });

      window.activateTab = function(tabName) {
          const containers =['fy-container', 'main-grid', 'bustarain-container', 'memo-container'];
          containers.forEach(id => {
              const el = document.getElementById(id);
              if (el) el.style.display = 'none';
          });
          const tabs =['tab-fy', 'tab-all-apps', 'tab-bustarain', 'tab-memo'];
          tabs.forEach(id => {
              const el = document.getElementById(id);
              if (el) el.classList.remove('active');
          });
          if (tabName === 'fy') {
              document.getElementById('fy-container').style.display = 'block';
              document.getElementById('tab-fy').classList.add('active');
          } else if (tabName === 'all-apps') {
              document.getElementById('main-grid').style.display = 'block';
              document.getElementById('tab-all-apps').classList.add('active');
          } else if (tabName === 'bustarain') {
              document.getElementById('bustarain-container').style.display = 'block';
              document.getElementById('tab-bustarain').classList.add('active');
          } else if (tabName === 'memo') {
              document.getElementById('memo-container').style.display = 'block';
              document.getElementById('tab-memo').classList.add('active');
          }
          window.scrollTo(0, 0);
      };

      document.addEventListener('DOMContentLoaded', () => {
          const memoPad = document.getElementById('memo-pad');
          const memoStatus = document.getElementById('memo-status');
          if (memoPad) {
              const savedMemo = localStorage.getItem('userMemo');
              if (savedMemo) memoPad.value = savedMemo;
              let timeoutId;
              memoPad.addEventListener('input', () => {
                  memoStatus.textContent = '保存中...';
                  clearTimeout(timeoutId);
                  timeoutId = setTimeout(() => {
                      localStorage.setItem('userMemo', memoPad.value);
                      memoStatus.textContent = '保存しました';
                      setTimeout(() => { memoStatus.textContent = ''; }, 2000);
                  }, 1000); 
              });
          }
      });
  </script>
</body>
</html>
