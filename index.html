<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Link First</title>
  <link rel="icon" href="./icon.png" type="image/png">
  <link rel="apple-touch-icon" href="./icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
  <!-- 外部CSSの読み込み -->
  <link rel="stylesheet" href="style.css">
  <style>
    /* 日付・時計・タブの配置の調整 */
    .datetime-row {
        display: flex;
        align-items: center;
        gap: 15px;
        flex-grow: 1;
    }
    
    @media (max-width: 768px) {
        .datetime-row {
            flex-wrap: wrap;
            gap: 10px;
        }
    }
  </style>
</head>
<body>
  <div class="fixed-top-wrapper">
    <div class="clock-area">
        <div class="clock-main-row">
            <div class="left-section" style="display: flex; align-items: center; flex-grow: 1;">
                <img src="./icon.png" alt="Link First Logo" class="site-logo">
                <div class="datetime-row">
                    <div id="custom-date"></div>
                    <div id="custom-clock"></div>
                    
                    <!-- ヘッダータブと埋め込み -->
                    <nav class="header-nav">
                        <div class="tab-item" id="tab-all-apps" onclick="activateTab('all-apps')"> 
                            <i class="fas fa-th-large"></i> <span>Apps</span> 
                        </div>
                        <div class="tab-item active" id="tab-fy" onclick="activateTab('fy')"> 
                            <i class="fas fa-home fy-icon"></i> <span>Home</span> 
                        </div>
                        <div class="tab-item" id="tab-bustarain" onclick="activateTab('bustarain')"> 
                            <i class="fas fa-bus"></i> <span>Traffic</span> 
                        </div>
                        <div class="tab-item" id="tab-memo" onclick="activateTab('memo')"> 
                            <i class="fas fa-pen-alt"></i> <span>Memo</span> 
                        </div>
                        
                        <!-- Home埋め込み (Memoの隣、0.5倍スケール) -->
                        <div class="header-home-embed">
                            <iframe src="https://statsoverlay.prismillon.com/?name=FY%20Tasu" scrolling="no" title="Home Stats"></iframe>
                        </div>
                    </nav>

                </div>
            </div>
             <div class="header-controls">
                <!-- Theme Switcher -->
                <div class="theme-switcher">
                    <div class="theme-dot light" onclick="setTheme('light')" title="Light Mode"></div>
                    <div class="theme-dot dark" onclick="setTheme('dark')" title="Dark Mode"></div>
                </div>
                <!-- Network & Refresh -->
                <div id="network-status" class="online" title="オンライン"><i class="fas fa-wifi"></i> <span>ON</span></div>
                <div class="control-icon" id="refresh-button" onclick="location.reload()"><i class="fas fa-sync-alt"></i></div>
                <!-- SpeedTest PC -->
                <div class="header-speed-test" id="header-speed-test-container">
                    <iframe id="speed-test-iframe" src="https://fast.com/ja/" title="速度テスト" loading="lazy" scrolling="no"></iframe>
                    <div class="control-icon" id="speed-test-refresh-button" onclick="reloadSpeedTest()"><i class="fas fa-redo"></i></div>
                </div>
            </div>
        </div>
    </div>
  </div>

  <div class="page-container">
      <!-- Home コンテナ (埋め込みは上部タブ横に移動したため空枠のみ) -->
      <div id="fy-container" style="display: block;">
          <!-- 埋め込みはヘッダーに移動しました -->
      </div>

    <!-- メインアプリ一覧 -->
    <div class="main-grid" id="main-grid" style="display: none;">
        <div id="all-apps-container">
            <h3 class="section-title">すべてのアプリ</h3>

            <!-- アプリのリスト (アイコンの下に名前・横8個) -->
            <div class="grid-container" id="gridContainer">
                <a href="https://www.google.com" target="_blank" class="app-icon-card">
                    <div class="app-icon-wrapper"><i class="fab fa-google" style="color: #4285F4;"></i></div>
                    <div class="app-name">Google</div>
                </a>
                <a href="https://www.youtube.com" target="_blank" class="app-icon-card">
                    <div class="app-icon-wrapper"><i class="fab fa-youtube" style="color: #FF0000;"></i></div>
                    <div class="app-name">YouTube</div>
                </a>
                <a href="https://x.com" target="_blank" class="app-icon-card">
                    <div class="app-icon-wrapper"><i class="fab fa-twitter" style="color: #1DA1F2;"></i></div>
                    <div class="app-name">X (Twitter)</div>
                </a>
                <a href="https://github.com" target="_blank" class="app-icon-card">
                    <div class="app-icon-wrapper"><i class="fab fa-github" style="color: var(--text-color-primary);"></i></div>
                    <div class="app-name">GitHub</div>
                </a>
            </div>
        </div>
    </div>

    <!-- Bustarain (交通) コンテナ -->
    <div id="bustarain-container" style="display: none;">
        <!-- モバイル版 -->
        <div id="traffic-mobile-view">
            <div id="mobile-traffic-all" class="traffic-grid sub-tab-content" style="margin-top: 15px;">
                <a href="Bustarain/train/wadmisaki-train.html" target="_blank" class="app-card traffic-card"><div class="card-left"><i class="fas fa-subway"></i></div><div class="card-divider"></div><div class="card-right"><div class="card-title">電車一覧</div></div></a>
                <a href="Bustarain/bus/Buslocation.html" target="_blank" class="app-card traffic-card"><div class="card-left"><i class="fas fa-map-marked-alt"></i></div><div class="card-divider"></div><div class="card-right"><div class="card-title">バスロケーション</div></div></a>
                <a href="Bustarain/bus/imadezaike.html" target="_blank" class="app-card traffic-card"><div class="card-left"><i class="fas fa-bus-alt"></i></div><div class="card-divider"></div><div class="card-right"><div class="card-title">バス時刻一覧</div></div></a>
            </div>
        </div>

        <!-- PC版 -->
        <div id="traffic-pc-view">
            <div class="pc-traffic-display">
                <div class="pc-display-header" id="pc-header-title">Select Info</div>
                <div class="pc-placeholder" id="pc-placeholder-msg">リストから選択してください</div>
                <iframe id="pc-main-iframe" src=""></iframe>
            </div>
            <div class="pc-traffic-sidebar">
                <div class="pc-sidebar-header">
                    <div class="scroll-arrow" onclick="scrollTrafficList(-50)"><i class="fas fa-chevron-up"></i></div>
                </div>
                <div id="pc-list-all" class="pc-traffic-list">
                    <div class="pc-traffic-item">
                        <span class="pc-item-label" onclick="loadPcTraffic('Bustarain/train/wadmisaki-train.html', this, '🚃電車一覧')">電車一覧</span>
                        <button class="pc-new-tab-btn" onclick="openNewTab('Bustarain/train/wadmisaki-train.html', event)" title="新しいタブで開く"><i class="fas fa-external-link-alt"></i></button>
                    </div>
                    <div class="pc-traffic-item">
                        <span class="pc-item-label" onclick="loadPcTraffic('Bustarain/bus/Buslocation.html', this, '🚌バスロケーション')">バスロケーション</span>
                        <button class="pc-new-tab-btn" onclick="openNewTab('Bustarain/bus/Buslocation.html', event)" title="新しいタブで開く"><i class="fas fa-external-link-alt"></i></button>
                    </div>
                    <div class="pc-traffic-item">
                        <span class="pc-item-label" onclick="loadPcTraffic('Bustarain/bus/imadezaike.html', this, '🚌バス時刻一覧')">バス時刻一覧</span>
                        <button class="pc-new-tab-btn" onclick="openNewTab('Bustarain/bus/imadezaike.html', event)" title="新しいタブで開く"><i class="fas fa-external-link-alt"></i></button>
                    </div>
                </div>
                <div class="pc-sidebar-footer">
                    <div class="scroll-arrow" onclick="scrollTrafficList(50)"><i class="fas fa-chevron-down"></i></div>
                </div>
            </div>
        </div>
    </div>

    <!-- メモ帳 コンテナ -->
    <div id="memo-container" style="display: none;">
        <h3 class="section-title"><i class="fas fa-sticky-note"></i> メモ帳 (Auto Save)</h3>
        <textarea id="memo-pad" placeholder="ここにメモを入力..."></textarea>
        <div id="memo-status"></div>
    </div>
  </div>
  
  <!-- script.js の読み込み -->
  <script type="module" src="script.js"></script>
  
  <script>
      /**
       * 時計表示（秒数まで）のリアルタイム更新
       */
      function updateDateTime() {
          const now = new Date();
          const dateEl = document.getElementById('custom-date');
          const clockEl = document.getElementById('custom-clock');
          
          if (dateEl) {
              const year = now.getFullYear();
              const month = String(now.getMonth() + 1).padStart(2, '0');
              const date = String(now.getDate()).padStart(2, '0');
              const days =['日', '月', '火', '水', '木', '金', '土'];
              const day = days[now.getDay()];
              dateEl.textContent = `${year}/${month}/${date}(${day})`;
          }
          
          if (clockEl) {
              const hours = String(now.getHours()).padStart(2, '0');
              const minutes = String(now.getMinutes()).padStart(2, '0');
              const seconds = String(now.getSeconds()).padStart(2, '0');
              clockEl.textContent = `${hours}:${minutes}:${seconds}`;
          }
      }
      setInterval(updateDateTime, 1000);
      updateDateTime(); 

      /**
       * 最初にHomeタブを必ず開く
       */
      document.addEventListener('DOMContentLoaded', () => {
          activateTab('fy');
      });

      // タブ切り替えロジック
      window.activateTab = function(tabName) {
          const containers =['fy-container', 'main-grid', 'bustarain-container', 'memo-container'];
          containers.forEach(id => {
              const el = document.getElementById(id);
              if (el) el.style.display = 'none';
          });
          const tabs =['tab-fy', 'tab-all-apps', 'tab-bustarain', 'tab-memo'];
          tabs.forEach(id => {
              const el = document.getElementById(id);
              if (el) el.classList.remove('active');
          });
          if (tabName === 'fy') {
              document.getElementById('fy-container').style.display = 'block';
              document.getElementById('tab-fy').classList.add('active');
          } else if (tabName === 'all-apps') {
              document.getElementById('main-grid').style.display = 'block';
              document.getElementById('tab-all-apps').classList.add('active');
          } else if (tabName === 'bustarain') {
              document.getElementById('bustarain-container').style.display = 'block';
              document.getElementById('tab-bustarain').classList.add('active');
          } else if (tabName === 'memo') {
              document.getElementById('memo-container').style.display = 'block';
              document.getElementById('tab-memo').classList.add('active');
          }
          window.scrollTo(0, 0);
      };

      // PC Traffic 
      window.loadPcTraffic = function(url, labelElement, title) {
          const iframe = document.getElementById('pc-main-iframe');
          const placeholder = document.getElementById('pc-placeholder-msg');
          const headerTitle = document.getElementById('pc-header-title');
          placeholder.style.display = 'none';
          iframe.src = url;
          if(title) headerTitle.textContent = title;
          document.querySelectorAll('.pc-traffic-item').forEach(el => el.classList.remove('active'));
          if(labelElement && labelElement.parentElement) labelElement.parentElement.classList.add('active');
      };

      window.openNewTab = function(url, event) {
          event.stopPropagation(); window.open(url, '_blank');
      }

      window.scrollTrafficList = function(amount) {
          const activeList = document.querySelector('.pc-traffic-list:not(.hidden)');
          if(activeList) activeList.scrollBy({ top: amount, behavior: 'smooth' });
      };

      // メモ帳
      document.addEventListener('DOMContentLoaded', () => {
          const memoPad = document.getElementById('memo-pad');
          const memoStatus = document.getElementById('memo-status');
          if (memoPad) {
              const savedMemo = localStorage.getItem('userMemo');
              if (savedMemo) memoPad.value = savedMemo;
              let timeoutId;
              memoPad.addEventListener('input', () => {
                  memoStatus.textContent = '保存中...';
                  clearTimeout(timeoutId);
                  timeoutId = setTimeout(() => {
                      localStorage.setItem('userMemo', memoPad.value);
                      memoStatus.textContent = '保存しました';
                      setTimeout(() => { memoStatus.textContent = ''; }, 2000);
                  }, 1000); 
              });
          }
      });
  </script>
</body>
</html>
