<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大学の教科書館</title>
    <style>
        /* --- 全体のデザイン --- */
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        
        /* --- 付箋風ヘッダーのデザイン --- */
        .fusen-header {
            background-color: #ffffcc;
            padding: 20px 30px;
            margin: 20px auto 50px;
            max-width: 900px;
            box-shadow: 3px 5px 10px rgba(0,0,0,0.15);
            border-left: 10px solid #ffeb3b;
            border-radius: 2px;
        }
        .fusen-header h1 {
            text-align: center;
            margin: 0 0 15px 0;
            font-size: 1.8em;
            color: #2c3e50;
        }
        .fusen-header .department {
            text-align: left;
            margin: 0;
            font-size: 1.2em;
            font-weight: bold;
            color: #555;
        }

        /* --- 本を横に5冊並べるレイアウト --- */
        .book-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* --- 本1冊あたりのカードデザイン --- */
        .book-card {
            background: #fff;
            border-radius: 8px;
            padding: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
            text-align: center;
        }
        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
        }

        /* 画像のデザイン（タグにwidthなどが書いてあっても枠に綺麗に収める設定） */
        .book-card img {
            width: 100%;
            height: 260px;
            object-fit: cover; /* 比率を保ちながら枠いっぱいに表示 */
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid #eee;
            background-color: #e0e0e0; 
        }

        /* テキスト情報のデザイン */
        .book-title {
            font-size: 1em;
            font-weight: bold;
            margin: 10px 0 5px;
            line-height: 1.3;
        }
        .book-pages {
            font-size: 0.85em;
            color: #666;
            margin: 5px 0 10px;
        }
        
        /* 入荷予定のバッジ */
        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.8em;
            font-weight: bold;
            color: #fff;
        }

        /* --- スマホなど画面が狭い時の調整 --- */
        @media (max-width: 900px) {
            .book-container { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 500px) {
            .book-container { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <div class="fusen-header">
        <h1>大学の教科書館</h1>
        <p class="department">p-情報工学科</p>
    </div>

    <div id="book-list" class="book-container"></div>

    <script>
        /* --- データ管理 --- */
        const booksData = [
            {
                title: "REDING ACCESS",
                // ★ <img> タグをそのまま書くように変更しました。全体をシングルクォーテーション(')で囲んでいます。
                imageTag: '<img src="Campus-tb/IMG/Racces1.jpeg" alt="REDING ACCESS" title="REDING ACCESS">',
                linkUrl: "page1.html",  
                pages: "P.1 〜 P.200",  
                status: "入荷済み",     
                statusCode: "#4CAF50"
            },
            {
                title: "C言語 プログラミング",
                imageTag: '<img src="IMG/book2.jpg" alt="C言語 プログラミング" title="C言語" width="300" height="400">',
                linkUrl: "page2.html",
                pages: "P.1 〜 P.120",
                status: "入荷済み",
                statusCode: "#4CAF50"
            },
            {
                title: "アルゴリズムとデータ構造",
                imageTag: '<img src="IMG/book3.jpg" alt="アルゴリズムとデータ構造" title="アルゴリズム">',
                linkUrl: "page3.html",
                pages: "未収録",
                status: "11月中旬 入荷予定",
                statusCode: "#FF9800"
            },
            {
                title: "離散数学",
                imageTag: '<img src="IMG/book4.jpg" alt="離散数学" title="離散数学">',
                linkUrl: "page4.html",
                pages: "P.1 〜 P.50",
                status: "後半ページ作成中",
                statusCode: "#03A9F4"
            },
            {
                title: "コンピュータアーキテクチャ",
                imageTag: '<img src="IMG/book5.jpg" alt="コンピュータアーキテクチャ" title="アーキテクチャ">',
                linkUrl: "page5.html",
                pages: "準備中",
                status: "入荷未定",
                statusCode: "#9E9E9E"
            },
            {
                title: "オペレーティングシステム",
                imageTag: '<img src="IMG/book6.jpg" alt="オペレーティングシステム" title="OS">',
                linkUrl: "page6.html",
                pages: "P.1 〜 P.250",
                status: "全ページ入荷",
                statusCode: "#4CAF50"
            }
        ];

        /* --- 画面に表示する処理 --- */
        const bookListContainer = document.getElementById('book-list');
        let htmlContent = '';

        booksData.forEach(book => {
            htmlContent += `
                <div class="book-card">
                    <!-- 画像リンク -->
                    <a href="${book.linkUrl}">
                        <!-- JavaScriptで書いた<img>タグがそのままここに入ります -->
                        ${book.imageTag}
                    </a>
                    
                    <div class="book-title">${book.title}</div>
                    <div class="book-pages">収録範囲: ${book.pages}</div>
                    
                    <div class="status-badge" style="background-color: ${book.statusCode};">
                        ${book.status}
                    </div>
                </div>
            `;
        });

        bookListContainer.innerHTML = htmlContent;
    </script>

</body>
</html>
