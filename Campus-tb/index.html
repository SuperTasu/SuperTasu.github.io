<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大学の教科書館</title>
    <style>
        /* デザイン部分は変更なし */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .fusen-header { background-color: #ffffcc; padding: 20px 30px; margin: 20px auto 30px; max-width: 900px; box-shadow: 3px 5px 10px rgba(0,0,0,0.15); border-left: 10px solid #ffeb3b; border-radius: 2px; }
        .fusen-header h1 { text-align: center; margin: 0; font-size: 1.8em; color: #2c3e50; }
        .tab-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; margin-top: 20px; }
        .tab-btn { padding: 10px 30px; font-size: 1.1em; font-weight: bold; border: none; border-radius: 25px; background-color: #e0e0e0; color: #555; cursor: pointer; transition: all 0.3s; }
        .tab-btn.active { background-color: #2c3e50; color: #fff; transform: translateY(-2px); }
        .book-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .book-card { background: #fff; border-radius: 8px; padding: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.08); text-align: center; }
        .book-card img { width: 100%; height: 260px; object-fit: cover; border-radius: 4px; border: 1px solid #eee; }
        .book-title { font-size: 1em; font-weight: bold; margin: 10px 0; min-height: 2.6em; display: flex; align-items: center; justify-content: center; }
        .status-badge { display: inline-block; padding: 5px 10px; border-radius: 15px; font-size: 0.8em; font-weight: bold; color: #fff; margin-bottom: 10px; }
        .detail-btn { display: block; width: 100%; padding: 10px 0; background: #2c3e50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        
        /* モーダル */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-content { background: #fff; margin: 10% auto; padding: 25px; border-radius: 8px; width: 90%; max-width: 500px; position: relative; }
        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; }
    </style>
</head>
<body>

<div class="fusen-header">
    <h1>大学の教科書館</h1>
    <p style="text-align:left; font-weight:bold;">p-情報工学科</p>
</div>

<div class="tab-container">
    <!-- IDを付与してJSから制御しやすくします -->
    <button id="tab1" class="tab-btn active">1年次</button>
    <button id="tab2" class="tab-btn">2年次</button>
    <button id="tab3" class="tab-btn">3年次</button>
</div>

<div id="book-list" class="book-container">
    <p style="text-align:center; grid-column: 1/-1;">読み込み中...</p>
</div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        <div id="modalBody"></div>
    </div>
</div>

<a href="admin.html" style="display:block; text-align:center; margin-top:50px; color:#888; text-decoration:none;">🛠 管理画面へ</a>

<!-- Firebase SDK -->
<script type="module">
    // 必要な機能だけをインポート
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // --- 【重要】ここにFirebaseコンソールからコピーした本物の設定を貼り付けてください ---
    const firebaseConfig = {
        apiKey: "ここを書き換える",
        authDomain: "kyoukasyokanna.firebaseapp.com",
        projectId: "kyoukasyokanna",
        storageBucket: "kyoukasyokanna.appspot.com",
        messagingSenderId: "ここを書き換える",
        appId: "ここを書き換える"
    };

    // Firebase初期化
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentYear = 1;
    let allBooks = [];

    // データのリアルタイム取得
    const q = query(collection(db, "books"), orderBy("year", "asc"));
    onSnapshot(q, (snapshot) => {
        allBooks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        render();
    });

    // 画面表示関数
    function render() {
        const container = document.getElementById('book-list');
        const filtered = allBooks.filter(b => Number(b.year) === currentYear);
        
        if (filtered.length === 0) {
            container.innerHTML = `<p style="grid-column:1/-1; text-align:center; padding:40px;">登録されている本がありません。</p>`;
            return;
        }

        container.innerHTML = filtered.map(book => `
            <div class="book-card">
                <div class="status-badge" style="background-color: ${book.statusCode || '#999'};">${book.status}</div>
                <img src="${book.imageSrc}" alt="">
                <div class="book-title">${book.title}</div>
                <button class="detail-btn" data-id="${book.id}">詳細を見る</button>
            </div>
        `).join('');

        // 「詳細を見る」ボタンにイベントを設定
        document.querySelectorAll('.detail-btn').forEach(btn => {
            btn.addEventListener('click', () => showDetail(btn.dataset.id));
        });
    }

    // タブ切り替えイベント
    [1, 2, 3].forEach(year => {
        document.getElementById(`tab${year}`).addEventListener('click', () => {
            currentYear = year;
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i + 1 === year);
            });
            render();
        });
    });

    // 詳細モーダル表示
    function showDetail(id) {
        const b = allBooks.find(book => book.id === id);
        if(!b) return;

        document.getElementById('modalBody').innerHTML = `
            <h2 style="margin-top:0;">${b.title}</h2>
            <p style="line-height:1.6; white-space:pre-wrap;">${b.description || '説明はありません。'}</p>
            <div style="background:#f0f0f0; padding:15px; border-radius:5px; font-size:0.9em;">
                <strong>収録範囲:</strong> ${b.pages}<br>
                <strong>状況:</strong> ${b.status}<br>
                <strong>更新日:</strong> ${b.lastUpdated}
            </div>
            <a href="${b.linkUrl}" target="_blank" style="display:block; text-align:center; margin-top:20px; background:#03A9F4; color:white; padding:10px; border-radius:4px; text-decoration:none;">この本を詳しく見る</a>
        `;
        document.getElementById('detailModal').style.display = 'block';
    }

    // モーダルを閉じる処理
    document.querySelector('.close-btn').onclick = () => {
        document.getElementById('detailModal').style.display = 'none';
    };
    window.onclick = (event) => {
        if (event.target == document.getElementById('detailModal')) {
            document.getElementById('detailModal').style.display = 'none';
        }
    };
</script>

</body>
</html>
