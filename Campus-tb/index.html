<!DOCTYPE html>
<html lang="ja">
<head>
    <!-- CSSは前回と同じ (モーダル、タブ、カード等) -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大学の教科書館 (Firebase版)</title>
    <style>
        /* 前回のCSSをそのまま貼り付けてください */
        body { font-family: sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .fusen-header { background-color: #ffffcc; padding: 20px; margin: 20px auto; max-width: 900px; border-left: 10px solid #ffeb3b; }
        .tab-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; border-radius: 20px; background: #ddd; }
        .tab-btn.active { background: #2c3e50; color: white; }
        .book-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .book-card { background: white; padding: 15px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .book-card img { width: 100%; height: 200px; object-fit: cover; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 10px; color: white; font-size: 0.8em; margin-bottom: 10px; }
        .detail-btn { width: 100%; padding: 8px; margin-top: 10px; cursor: pointer; }
        /* モーダル */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 15% auto; padding: 20px; width: 80%; max-width: 500px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="fusen-header">
    <h1>大学の教科書館</h1>
    <p>p-情報工学科</p>
</div>

<div class="tab-container">
    <button class="tab-btn active" onclick="changeTab(1)">1年次</button>
    <button class="tab-btn" onclick="changeTab(2)">2年次</button>
    <button class="tab-btn" onclick="changeTab(3)">3年次</button>
</div>

<div id="book-list" class="book-container"></div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <div id="modalBody"></div>
        <button onclick="closeModal()" style="margin-top:20px;">閉じる</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, where } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { /* admin.htmlと同じ設定をここに貼る */ };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let currentYear = 1;
    let allBooks = [];

    // データの取得
    onSnapshot(collection(db, "books"), (snapshot) => {
        allBooks = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
        render();
    });

    function render() {
        const container = document.getElementById('book-list');
        const filtered = allBooks.filter(b => b.year === currentYear);
        
        container.innerHTML = filtered.map(book => `
            <div class="book-card">
                <div class="status-badge" style="background-color: ${book.statusCode};">${book.status}</div>
                <img src="${book.imageSrc}">
                <div style="font-weight:bold; margin:10px 0;">${book.title}</div>
                <button class="detail-btn" onclick="showDetail('${book.id}')">詳細を見る</button>
            </div>
        `).join('');
    }

    window.changeTab = (year) => {
        currentYear = year;
        document.querySelectorAll('.tab-btn').forEach((btn, i) => {
            btn.classList.toggle('active', i + 1 === year);
        });
        render();
    };

    window.showDetail = (id) => {
        const b = allBooks.find(book => book.id === id);
        document.getElementById('modalBody').innerHTML = `
            <h2>${b.title}</h2>
            <p>${b.description}</p>
            <hr>
            <p>範囲: ${b.pages} / 更新: ${b.lastUpdated}</p>
            <a href="${b.linkUrl}" target="_blank">リンクを開く</a>
        `;
        document.getElementById('detailModal').style.display = 'block';
    };

    window.closeModal = () => { document.getElementById('detailModal').style.display = 'none'; };
</script>
</body>
</html>
