<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教科書館 - 管理画面 (Firebase版)</title>
    <style>
        /* スタイルは前回と同じ */
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ccc; padding-bottom: 10px; margin-bottom: 20px; }
        .admin-badge { color: red; font-weight: bold; font-size: 1.2em; border: 2px solid red; padding: 5px 10px; border-radius: 5px; }
        .form-container { background: #fff; padding: 20px; border-radius: 8px; max-width: 600px; margin: 0 auto 40px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9em; }
        input[type="text"], select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        textarea { height: 80px; resize: vertical; }
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; font-size: 1em; border-radius: 4px; cursor: pointer; border: none; }
        .btn-submit { background-color: #2c3e50; color: white; }
        .btn-cancel { background-color: #9e9e9e; color: white; display: none; }
        .admin-list { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th, td { border-bottom: 1px solid #ddd; padding: 10px; text-align: left; font-size: 0.9em; }
        .btn-edit { background: #4CAF50; color: white; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
        .btn-delete { background: #f44336; color: white; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
        .links { text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

<div class="header">
    <h2>教科書館 データ管理 (Firebase)</h2>
    <div class="admin-badge">ADMIN</div>
</div>

<div class="form-container">
    <h3 id="form-title">新規登録</h3>
    <form id="bookForm">
        <input type="hidden" id="editId" value="">
        <div class="form-group">
            <label>年次</label>
            <select id="year" required><option value="1">1年次</option><option value="2">2年次</option><option value="3">3年次</option></select>
        </div>
        <div class="form-group">
            <label>タイトル</label>
            <input type="text" id="title" required>
        </div>
        <div class="form-group">
            <label>詳細説明</label>
            <textarea id="description" required></textarea>
        </div>
        <div class="form-group">
            <label>画像パス (例: IMG/book1.jpg)</label>
            <input type="text" id="imageSrc" required>
        </div>
        <div class="form-group">
            <label>リンクURL</label>
            <input type="text" id="linkUrl" required>
        </div>
        <div class="form-group">
            <label>収録範囲</label>
            <input type="text" id="pages" required>
        </div>
        <div class="form-group">
            <label>状況</label>
            <input type="text" id="status" required>
        </div>
        <div class="form-group">
            <label>バッジ色</label>
            <select id="statusCode" required>
                <option value="#4CAF50">緑</option>
                <option value="#FF9800">オレンジ</option>
                <option value="#03A9F4">青</option>
                <option value="#9E9E9E">グレー</option>
            </select>
        </div>
        <div class="btn-group">
            <button type="submit" class="btn-submit" id="submitBtn">登録する</button>
            <button type="button" class="btn-cancel" id="cancelBtn">キャンセル</button>
        </div>
    </form>
</div>

<div class="admin-list">
    <table>
        <thead><tr><th>年次</th><th>タイトル</th><th>操作</th></tr></thead>
        <tbody id="adminTableBody"></tbody>
    </table>
</div>

<div class="links"><a href="index.html">→ 表示ページへ</a></div>

<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, onSnapshot, doc, updateDoc, deleteDoc, serverTimestamp, query, orderBy } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // --- ここにご自身のFirebase設定を貼り付けてください ---
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyD6dJF5sdIkI2AogResSKap4oXyrt2ThaU",
  authDomain: "kyoukasyokanna.firebaseapp.com",
  databaseURL: "https://kyoukasyokanna-default-rtdb.firebaseio.com",
  projectId: "kyoukasyokanna",
  storageBucket: "kyoukasyokanna.firebasestorage.app",
  messagingSenderId: "631430786250",
  appId: "1:631430786250:web:b69550b7733700330ed833",
  measurementId: "G-SDRQ7FPB4G"
};
    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const 
    // --------------------------------------------------

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const booksCol = collection(db, "books");

    const bookForm = document.getElementById('bookForm');
    const adminTableBody = document.getElementById('adminTableBody');

    // リアルタイムでリストを更新
    onSnapshot(query(booksCol, orderBy("year")), (snapshot) => {
        adminTableBody.innerHTML = '';
        snapshot.forEach((doc) => {
            const book = doc.data();
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${book.year}年</td>
                <td>${book.title}</td>
                <td>
                    <button class="btn-edit" onclick="editData('${doc.id}')">編集</button>
                    <button class="btn-delete" onclick="deleteData('${doc.id}')">削除</button>
                </td>
            `;
            adminTableBody.appendChild(tr);
        });
    });

    // 登録・更新
    bookForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('editId').value;
        const now = new Date();
        const dateStr = `${now.getFullYear()}.${now.getMonth()+1}.${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;

        const data = {
            year: Number(document.getElementById('year').value),
            title: document.getElementById('title').value,
            description: document.getElementById('description').value,
            imageSrc: document.getElementById('imageSrc').value,
            linkUrl: document.getElementById('linkUrl').value,
            pages: document.getElementById('pages').value,
            status: document.getElementById('status').value,
            statusCode: document.getElementById('statusCode').value,
            lastUpdated: dateStr,
            createdAt: serverTimestamp()
        };

        if (id) {
            await updateDoc(doc(db, "books", id), data);
            alert("更新しました");
        } else {
            await addDoc(booksCol, data);
            alert("登録しました");
        }
        resetForm();
    });

    // 編集用データ取得 (グローバル関数にする)
    window.editData = async (id) => {
        const snapshot = await getDocs(booksCol);
        snapshot.forEach((d) => {
            if(d.id === id) {
                const b = d.data();
                document.getElementById('editId').value = id;
                document.getElementById('year').value = b.year;
                document.getElementById('title').value = b.title;
                document.getElementById('description').value = b.description;
                document.getElementById('imageSrc').value = b.imageSrc;
                document.getElementById('linkUrl').value = b.linkUrl;
                document.getElementById('pages').value = b.pages;
                document.getElementById('status').value = b.status;
                document.getElementById('statusCode').value = b.statusCode;
                
                document.getElementById('submitBtn').innerText = "更新する";
                document.getElementById('cancelBtn').style.display = "inline-block";
                window.scrollTo(0,0);
            }
        });
    };

    window.deleteData = async (id) => {
        if(confirm("削除しますか？")) await deleteDoc(doc(db, "books", id));
    };

    function resetForm() {
        bookForm.reset();
        document.getElementById('editId').value = "";
        document.getElementById('submitBtn').innerText = "登録する";
        document.getElementById('cancelBtn').style.display = "none";
    }
    document.getElementById('cancelBtn').onclick = resetForm;

</script>
</body>
</html>
