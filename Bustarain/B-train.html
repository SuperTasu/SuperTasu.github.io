<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>B-train - 路線選択</title>
  
  <!-- ファビコンの設定 -->
  <link rel="icon" href="B-favi.png">
  <link rel="apple-touch-icon" href="B-favi.png">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* 常にダークモードとし、見やすく調整した変数 */
    :root {
      --bg-color: #121212;
      --text-color-primary: #ffffff;
      --text-color-secondary: #bbbbbb;
      --card-bg: #1e1e1e;
      --card-border: 2px solid #333333;
      --card-radius: 20px;
      --divider-color: #444444;
      --tab-active-bg: #4a90e2; /* アクセントカラー（青） */
      --input-bg: #2a2a2a;
    }

    /* 背景と全体の中央揃え */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text-color-primary);
      background-color: var(--bg-color);
      display: flex;
      justify-content: center; /* 全体を中央に */
      min-height: 100vh;
      box-sizing: border-box;
    }

    /* コンテンツをまとめるラッパー */
    .container {
      width: 100%;
      max-width: 1200px;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      align-items: center; 
      box-sizing: border-box;
    }

    /* タイトルとロゴ */
    .header-title {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 20px;
      color: var(--text-color-primary);
      gap: 15px;
    }
    .header-title img {
      width: 40px;
      height: 40px;
      border-radius: 8px; 
    }

    /* --- カウントダウン表示 --- */
    .countdown-container {
      display: flex;
      gap: 15px;
      width: 100%;
      max-width: 500px;
      margin-bottom: 30px;
      justify-content: space-between;
    }
    .countdown-item {
      flex: 1;
      background-color: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--divider-color);
      border-radius: 12px;
      padding: 12px 10px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .countdown-label {
      font-size: 13px;
      color: var(--text-color-secondary);
      margin-bottom: 5px;
    }
    .countdown-time {
      font-size: 16px;
      font-weight: bold;
      color: var(--tab-active-bg);
      font-variant-numeric: tabular-nums; /* 数字の幅を均等にしてガタツキ防止 */
    }
    .countdown-time.ended {
      color: var(--text-color-secondary);
    }

    /* スマホ版（600px以下）の時のカウントダウン表示設定 */
    @media (max-width: 600px) {
      .countdown-container {
        justify-content: center;
      }
      .countdown-item {
        display: none; /* 基本は全て非表示 */
      }
      .countdown-item.active-mobile {
        display: flex; /* jsで最も直近の授業にこのクラスを付与して表示 */
        max-width: 200px;
        flex: none;
        width: 100%;
      }
    }

    /* --- メインの選択カード --- */
    .selection-card {
      background-color: var(--card-bg);
      border: var(--card-border);
      border-radius: var(--card-radius);
      padding: 30px 20px;
      width: 100%;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .selection-title {
      font-size: 22px;
      font-weight: bold;
      color: var(--text-color-primary);
      margin-bottom: 20px;
    }

    /* --- 路線選択用のボタンスタイル --- */
    .train-btn-group {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 100%;
    }
    
    .train-btn {
      color: #ffffff;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: row; 
      align-items: center;
      justify-content: center;
      gap: 12px; 
    }
    .train-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.4);
    }
    
    .train-btn span {
      text-align: left;
      line-height: 1.3;
    }

    .train-icon {
      height: 30px;
      width: auto;
      object-fit: contain;
      flex-shrink: 0; 
    }
    .train-btn-row .train-icon {
      height: 22px; 
    }

    .train-btn-row {
      display: flex;
      gap: 10px;
      width: 100%;
    }
    .train-btn-row .train-btn {
      flex: 1;
      padding: 10px 6px;
      font-size: 12px; 
      gap: 6px;
      word-break: keep-all;
    }
    
    /* 個別路線カラー */
    .btn-jrwest { background-color: #0072bc; }
    .btn-jrwest:hover { background-color: #005a96; }

    .btn-keihan { background-color: #6a1b9a; }
    .btn-keihan:hover { background-color: #8e24aa; }

    .btn-hankyu { background-color: #631828; }
    .btn-hankyu:hover { background-color: #7a1f33; }
    
    .btn-seishin { background-color: #2e7d32; }
    .btn-seishin:hover { background-color: #388e3c; }
    
    .btn-kaigan { background-color: #0277bd; }
    .btn-kaigan:hover { background-color: #0288d1; }
    
    .btn-citybus { background-color: #e65100; }
    .btn-citybus:hover { background-color: #f57c00; }

    /* --- ロード中モーダルのスタイル --- */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(5px);
      display: none; 
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .loading-box {
      background-color: var(--card-bg);
      border: var(--card-border);
      border-radius: var(--card-radius);
      padding: 40px 30px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .loading-text {
      font-size: 22px;
      font-weight: bold;
      color: var(--text-color-primary);
      margin-bottom: 10px;
    }
    .loading-target-text {
      font-size: 16px;
      color: var(--tab-active-bg);
      margin-bottom: 25px;
      font-weight: bold;
    }
    .progress-container {
      width: 100%;
      height: 12px;
      background-color: var(--input-bg);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 30px;
      border: 1px solid var(--divider-color);
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background-color: var(--tab-active-bg);
      transition: width 0.05s linear; 
    }
    .cancel-btn {
      background-color: transparent;
      color: #ff6b6b;
      border: 2px solid #ff6b6b;
      padding: 10px 30px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .cancel-btn:hover {
      background-color: #ff6b6b;
      color: #fff;
    }

    /* --- 戻るボタン --- */
    .back-btn-wrapper {
      margin-top: 50px;
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      width: 100%;
    }
    
    .back-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 40px;
      background-color: var(--tab-active-bg);
      color: #ffffff;
      font-size: 18px;
      font-weight: bold;
      text-decoration: none;
      border-radius: 50px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    
    .back-btn i {
      margin-right: 12px;
      font-size: 22px;
    }
    
    .back-btn:hover {
      background-color: #357abd;
      transform: translateY(-3px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.5);
    }

    /* スクロールバーのカスタマイズ */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--divider-color); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-color-secondary); }
  </style>
</head>
<body>

  <div class="container">
  
    <!-- タイトルとロゴ -->
    <div class="header-title">
      <img src="B-favi.png" alt="B-train Logo">
      <span>B-train</span>
    </div>

    <!-- 授業開始までのカウントダウン -->
    <div class="countdown-container">
      <div id="class-1" class="countdown-item">
        <div class="countdown-label">1限目(09:00)まで</div>
        <div class="countdown-time">--:--:--</div>
      </div>
      <div id="class-2" class="countdown-item">
        <div class="countdown-label">2限目(10:55)まで</div>
        <div class="countdown-time">--:--:--</div>
      </div>
      <div id="class-3" class="countdown-item">
        <div class="countdown-label">3限目(13:25)まで</div>
        <div class="countdown-time">--:--:--</div>
      </div>
    </div>

    <!-- メインの路線選択画面 -->
    <div class="selection-card">
      <div class="selection-title">路線を選択してください</div>
      <div class="train-btn-group">
        
        <button class="train-btn btn-jrwest" data-url="https://www.train-guide.westjr.co.jp/kobesanyo.html?st=0417" data-title="JR西日本(公式)">
          <span>JR西日本(公式)</span>
        </button>

        <div class="train-btn-row">
          <button class="train-btn btn-keihan" data-url="https://www.keihan.co.jp/zaisen/" data-title="京阪電車(公式)">
            <img src="https://wsrv.nl/?url=trainfrontview.net/p/khan3004.png" alt="京阪電車アイコン" class="train-icon" crossorigin="anonymous">
            <span>京阪電車<br>(公式)</span>
          </button>
          <button class="train-btn btn-keihan" data-url="https://unyohub.2pd.jp/railroad_keihan/" data-title="京阪電車(非公式)">
            <img src="https://wsrv.nl/?url=trainfrontview.net/p/khan3004.png" alt="京阪電車アイコン" class="train-icon" crossorigin="anonymous">
            <span>京阪電車<br>(非公式)</span>
          </button>
        </div>

        <button class="train-btn btn-hankyu" data-url="https://unyohub.2pd.jp/railroad_hk_kobe/" data-title="阪急電車(非公式)">
          <img src="https://wsrv.nl/?url=trainfrontview.net/p/hnq1000.png" alt="阪急電車アイコン" class="train-icon" crossorigin="anonymous">
          <span>阪急電車(非公式)</span>
        </button>
        
        <div class="train-btn-row">
          <button class="train-btn btn-seishin" data-url="https://unyohub.2pd.jp/railroad_seishin_yamate/" data-title="西神・山手線(非公式)">
            <img src="https://wsrv.nl/?url=trainfrontview.net/p/kob2000.png" alt="西神・山手線アイコン" class="train-icon" crossorigin="anonymous">
            <span>西神・山手線<br>(非公式)</span>
          </button>
          <button class="train-btn btn-kaigan" data-url="https://unyohub.2pd.jp/railroad_kaigan/" data-title="海岸線(非公式)">
            <img src="https://wsrv.nl/?url=trainfrontview.net/p/kob5000.png" alt="海岸線アイコン" class="train-icon" crossorigin="anonymous">
            <span>海岸線<br>(非公式)</span>
          </button>
          <button class="train-btn btn-citybus" data-url="https://location.its-mo.com/kobe/" data-title="神戸市バス">
            <span>神戸市バス</span>
          </button>
        </div>

      </div>
    </div>

    <!-- 下部リンクボタン -->
    <div class="back-btn-wrapper">
        <a href="https://supertasu.github.io/" class="back-btn">
            <i class="fas fa-home"></i> Link Firstに戻る
        </a>
    </div>

  </div> <!-- /container -->

  <!-- ロード中画面（モーダル） -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-box">
      <div class="loading-text">ロード中...</div>
      <div id="loading-target-text" class="loading-target-text"></div>
      
      <div class="progress-container">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
      <button id="cancel-btn" class="cancel-btn">
        <i class="fas fa-times"></i> キャンセル
      </button>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // --- カウントダウンの処理 ---
      const classes = [
        { id: 'class-1', time: '09:00:00' },
        { id: 'class-2', time: '10:55:00' },
        { id: 'class-3', time: '13:25:00' }
      ];

      function updateCountdown() {
        const now = new Date();
        let nextClassIndex = -1;

        classes.forEach((cls, index) => {
          const [h, m, s] = cls.time.split(':');
          // 今日の日付でターゲット時刻を作成
          const target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, s);
          const diff = target - now;
          
          const el = document.getElementById(cls.id);
          const timeText = el.querySelector('.countdown-time');

          if (diff > 0) {
            // 未来の時刻の場合（カウントダウン表示）
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            let text = '';
            if (hours > 0) text += `${hours}時間`;
            if (minutes > 0 || hours > 0) text += `${minutes}分`;
            text += `${seconds}秒`;
            
            timeText.textContent = text;
            timeText.classList.remove('ended');
            
            // まだ「次に来る授業」が設定されていなければ設定する
            if (nextClassIndex === -1) {
              nextClassIndex = index;
            }
          } else {
            // 既に過ぎている場合
            timeText.textContent = '終了';
            timeText.classList.add('ended');
          }
          
          // 一旦スマホ用表示クラスを外す
          el.classList.remove('active-mobile');
        });

        // すべての授業が終了している場合は最後の授業をスマホ表示用にする
        if (nextClassIndex === -1) {
          nextClassIndex = classes.length - 1;
        }

        // スマホ版で表示する要素にクラスを付与
        document.getElementById(classes[nextClassIndex].id).classList.add('active-mobile');
      }

      // 1秒ごとに更新して初期実行
      setInterval(updateCountdown, 1000);
      updateCountdown();


      // --- ボタン・ロード中モーダルの処理 ---
      const overlay = document.getElementById('loading-overlay');
      const progressBar = document.getElementById('progress-bar');
      const cancelBtn = document.getElementById('cancel-btn');
      const loadingTargetText = document.getElementById('loading-target-text');
      const trainBtns = document.querySelectorAll('.train-btn');

      let loadTimeout;
      let progressInterval;
      
      function startLoading(url, title) {
        loadingTargetText.textContent = `「${title}」を開いています`;
        overlay.style.display = 'flex';
        progressBar.style.width = '0%';
        
        let progress = 0;
        const totalTime = 1000;
        const intervalTime = 20;
        const step = (intervalTime / totalTime) * 100;
        
        progressInterval = setInterval(() => {
          progress += step;
          if (progress >= 100) progress = 100;
          progressBar.style.width = progress + '%';
        }, intervalTime);
        
        loadTimeout = setTimeout(() => {
          clearInterval(progressInterval);
          overlay.style.display = 'none';
          window.location.href = url;
        }, totalTime);
      }

      trainBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          const url = btn.getAttribute('data-url');
          const title = btn.getAttribute('data-title');
          startLoading(url, title);
        });
      });
      
      cancelBtn.addEventListener('click', () => {
        clearTimeout(loadTimeout); 
        clearInterval(progressInterval); 
        overlay.style.display = 'none'; 
      });
    });
  </script>
</body>
</html>
