<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>B-train</title>
  
  <!-- ファビコンの設定 -->
  <link rel="icon" href="B-favi.png">
  <link rel="apple-touch-icon" href="B-favi.png">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* 常にダークモードとし、見やすく調整した変数 */
    :root {
      --bg-color: #121212;
      --text-color-primary: #ffffff;
      --text-color-secondary: #bbbbbb;
      --card-bg: #1e1e1e;
      --card-border: 2px solid #333333;
      --card-radius: 20px;
      --divider-color: #444444;
      --tab-active-bg: #4a90e2; /* アクセントカラー（青） */
      --input-bg: #2a2a2a;
    }

    /* 背景と全体の中央揃え */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text-color-primary);
      background-color: var(--bg-color);
      display: flex;
      justify-content: center; /* 全体を中央に */
      min-height: 100vh;
      box-sizing: border-box;
    }

    /* コンテンツをまとめるラッパー */
    .container {
      width: 100%;
      max-width: 1200px;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      align-items: center; 
      box-sizing: border-box;
    }

    /* タイトルとロゴ */
    .header-title {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 40px;
      color: var(--text-color-primary);
      gap: 15px;
    }
    .header-title img {
      width: 40px;
      height: 40px;
      border-radius: 8px; 
    }

    /* --- PC・スマホ共通 カードレイアウト --- */
    #traffic-view {
      width: 100%;
      max-width: 1000px;
      display: block;
    }
    
    .traffic-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
      gap: 20px; 
      justify-content: center;
    }

    .app-card { 
      display: flex; 
      flex-direction: row; 
      background-color: var(--card-bg); 
      border: var(--card-border); 
      border-radius: var(--card-radius); 
      overflow: hidden; 
      min-height: 110px; 
      height: auto;
      text-decoration: none; 
      color: var(--text-color-primary); 
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .app-card:hover { 
      transform: translateY(-4px);
      box-shadow: 0 8px 16px rgba(0,0,0,0.5); 
    }

    .card-left { 
      width: 30%; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      background-color: rgba(255,255,255,0.03); 
    }
    .card-left i { 
      font-size: 38px; 
      color: var(--tab-active-bg); 
    }

    .card-divider { 
      width: 2px; 
      background-color: var(--divider-color); 
      margin: 15px 0; 
      border-radius: 2px; 
    }

    .card-right { 
      width: 70%; 
      display: flex; 
      flex-direction: column;
      align-items: center; 
      justify-content: center; 
      padding: 15px 10px; 
      box-sizing: border-box; 
    }
    .card-title { 
      font-size: 16px; 
      font-weight: bold; 
      text-align: center; 
      line-height: 1.3;
      margin-bottom: 6px;
    }
    .card-details {
      font-size: 11px;
      color: var(--text-color-secondary);
      text-align: center;
      line-height: 1.6; 
    }

    /* --- ロード中＆選択モーダルのスタイル --- */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(5px);
      display: none; 
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .loading-box {
      background-color: var(--card-bg);
      border: var(--card-border);
      border-radius: var(--card-radius);
      padding: 40px 30px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .loading-text {
      font-size: 22px;
      font-weight: bold;
      color: var(--text-color-primary);
      margin-bottom: 10px;
    }
    .loading-target-text {
      font-size: 16px;
      color: var(--tab-active-bg);
      margin-bottom: 25px;
      font-weight: bold;
    }
    
    .progress-container {
      width: 100%;
      height: 12px;
      background-color: var(--input-bg);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 30px;
      border: 1px solid var(--divider-color);
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background-color: var(--tab-active-bg);
      transition: width 0.05s linear; 
    }
    .cancel-btn {
      background-color: transparent;
      color: #ff6b6b;
      border: 2px solid #ff6b6b;
      padding: 10px 30px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .cancel-btn:hover {
      background-color: #ff6b6b;
      color: #fff;
    }

    /* 路線選択用のボタンスタイル */
    .train-btn-group {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 100%;
      margin-top: 15px;
    }
    .train-btn {
      background-color: var(--input-bg);
      color: var(--text-color-primary);
      border: 1px solid var(--divider-color);
      padding: 15px 20px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    .train-btn:hover {
      background-color: var(--tab-active-bg);
      border-color: var(--tab-active-bg);
    }

    /* --- 戻るボタン --- */
    .back-btn-wrapper {
      margin-top: 50px;
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      width: 100%;
    }
    
    .back-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 40px;
      background-color: var(--tab-active-bg);
      color: #ffffff;
      font-size: 18px;
      font-weight: bold;
      text-decoration: none;
      border-radius: 50px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    
    .back-btn i {
      margin-right: 12px;
      font-size: 22px;
    }
    
    .back-btn:hover {
      background-color: #357abd;
      transform: translateY(-3px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.5);
    }
    
    /* スクロールバーのカスタマイズ */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--divider-color);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-color-secondary);
    }
  </style>
</head>
<body>

  <div class="container">
  
    <!-- タイトルとロゴ -->
    <div class="header-title">
      <img src="B-favi.png" alt="B-train Logo">
      <span>B-train</span>
    </div>

    <!-- PC・スマホ共通のカードリスト -->
    <div id="traffic-view">
        <div id="mobile-traffic-all" class="traffic-grid">
            
            <!-- 1. 電車一覧 -->
            <a href="train/wadmisaki-train.html" class="app-card">
                <div class="card-left"><i class="fas fa-subway"></i></div>
                <div class="card-divider"></div>
                <div class="card-right">
                    <div class="card-title">電車一覧</div>
                    <div class="card-details">
                        (西・山手線)板宿<br>
                        (海岸線)新長田、和田岬、ハーバーランド、三宮<br>
                        (京阪線)京橋、寝屋川
                    </div>
                </div>
            </a>
            
            <!-- 2. トレロケーション (京阪・地下鉄統合) -->
            <div id="train-location-card" class="app-card">
                <div class="card-left"><i class="fas fa-train"></i></div>
                <div class="card-divider"></div>
                <div class="card-right">
                    <div class="card-title">トレロケーション</div>
                    <div class="card-details">
                        京阪線、西神・山手線、海岸線の<br>列車走行位置情報
                    </div>
                </div>
            </div>
            
            <!-- 3. 神戸市バス一覧 -->
            <a href="bus/imadezaike.html" class="app-card">
                <div class="card-left"><i class="fas fa-bus-alt"></i></div>
                <div class="card-divider"></div>
                <div class="card-right">
                    <div class="card-title">神戸市バス一覧</div>
                    <div class="card-details">和田岬、今出在家町、県立兵庫津M前、中央市場</div>
                </div>
            </a>
            
            <!-- 4. 神戸市バスロケーション -->
            <a href="bus/Buslocation.html" class="app-card">
                <div class="card-left"><i class="fas fa-map-marked-alt"></i></div>
                <div class="card-divider"></div>
                <div class="card-right">
                    <div class="card-title">神戸市バスロケーション</div>
                    <div class="card-details">2026/03/31まで稼働中　以降は新システム</div>
                </div>
            </a>
            
        </div>
    </div>

    <!-- 下部リンクボタン (こちらも同じタブで遷移するように変更) -->
    <div class="back-btn-wrapper">
        <a href="https://supertasu.github.io/" class="back-btn">
            <i class="fas fa-home"></i> Link FIrstに戻る
        </a>
    </div>

  </div> <!-- /container -->

  <!-- 路線選択画面（モーダル） -->
  <div id="train-select-overlay" class="loading-overlay">
    <div class="loading-box">
      <div class="loading-text">路線を選択してください</div>
      <div class="train-btn-group">
        <button class="train-btn" data-url="https://www.keihan.co.jp/zaisen/" data-title="京阪線">京阪線</button>
        <button class="train-btn" data-url="https://unyohub.2pd.jp/railroad_seishin_yamate/" data-title="西神・山手線">西神・山手線</button>
        <button class="train-btn" data-url="https://unyohub.2pd.jp/railroad_kaigan/" data-title="海岸線">海岸線</button>
      </div>
      <button id="close-train-btn" class="cancel-btn" style="margin-top: 25px;">
        <i class="fas fa-times"></i> 閉じる
      </button>
    </div>
  </div>

  <!-- ロード中画面（モーダル） -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-box">
      <div class="loading-text">ロード中...</div>
      <div id="loading-target-text" class="loading-target-text"></div>
      
      <div class="progress-container">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
      <button id="cancel-btn" class="cancel-btn">
        <i class="fas fa-times"></i> キャンセル
      </button>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // ロード中モーダル関連
      const overlay = document.getElementById('loading-overlay');
      const progressBar = document.getElementById('progress-bar');
      const cancelBtn = document.getElementById('cancel-btn');
      const loadingTargetText = document.getElementById('loading-target-text');
      
      // 路線選択モーダル関連
      const trainSelectOverlay = document.getElementById('train-select-overlay');
      const trainLocationCard = document.getElementById('train-location-card');
      const closeTrainBtn = document.getElementById('close-train-btn');
      const trainBtns = document.querySelectorAll('.train-btn');

      let loadTimeout;
      let progressInterval;
      
      // 共通のロード処理関数 (全て同じタブで開く)
      function startLoading(url, title) {
        // 路線選択モーダルが開いていれば閉じる
        if (trainSelectOverlay.style.display === 'flex') {
          trainSelectOverlay.style.display = 'none';
        }

        loadingTargetText.textContent = `「${title}」を開いています`;
        overlay.style.display = 'flex';
        progressBar.style.width = '0%';
        
        let progress = 0;
        const totalTime = 1000; // 1秒 (1000ミリ秒)
        const intervalTime = 20; // 20ミリ秒ごとに更新
        const step = (intervalTime / totalTime) * 100;
        
        progressInterval = setInterval(() => {
          progress += step;
          if (progress >= 100) progress = 100;
          progressBar.style.width = progress + '%';
        }, intervalTime);
        
        loadTimeout = setTimeout(() => {
          clearInterval(progressInterval);
          overlay.style.display = 'none';
          
          // 全て同じタブ(現在の画面)で遷移する
          window.location.href = url;
        }, totalTime);
      }

      // 通常のカード（aタグ）のクリック処理
      const appCards = document.querySelectorAll('a.app-card');
      appCards.forEach(card => {
        card.addEventListener('click', function(e) {
          e.preventDefault(); 
          const url = this.getAttribute('href');
          const title = this.querySelector('.card-title').textContent;
          startLoading(url, title);
        });
      });

      // トレロケーションのカードがクリックされた時（選択モーダルを開く）
      if (trainLocationCard) {
        trainLocationCard.addEventListener('click', () => {
          trainSelectOverlay.style.display = 'flex';
        });
      }

      // 選択モーダルの「閉じる」ボタン処理
      if (closeTrainBtn) {
        closeTrainBtn.addEventListener('click', () => {
          trainSelectOverlay.style.display = 'none';
        });
      }

      // 路線（京阪線・西神山手線・海岸線）のボタンをクリックした時の処理
      trainBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          const url = btn.getAttribute('data-url');
          const title = btn.getAttribute('data-title');
          startLoading(url, title);
        });
      });
      
      // ロード中画面の「キャンセル」ボタン処理
      cancelBtn.addEventListener('click', () => {
        clearTimeout(loadTimeout); 
        clearInterval(progressInterval); 
        overlay.style.display = 'none'; 
      });
    });
  </script>
</body>
</html>
