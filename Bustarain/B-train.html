<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B-train<title>
  <style>
    /* 常にダークモードとし、見やすく調整した変数 */
    :root {
      --bg-color: #121212;
      --text-color-primary: #ffffff;
      --text-color-secondary: #bbbbbb;
      --card-bg: #1e1e1e;
      --card-border: 2px solid #333333;
      --card-radius: 20px;
      --divider-color: #444444;
      --tab-active-bg: #4a90e2; /* アクセントカラー（青） */
      --input-bg: #2a2a2a;
    }

    /* 背景と全体の中央揃え */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text-color-primary);
      background-color: var(--bg-color);
      display: flex;
      justify-content: center; /* 全体を中央に */
      min-height: 100vh;
      box-sizing: border-box;
    }

    /* コンテンツをまとめるラッパー */
    .container {
      width: 100%;
      max-width: 1200px;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      align-items: center; /* コンテンツ内も中央揃え */
      box-sizing: border-box;
    }

    /* タイトルとファビコン */
    .header-title {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 40px;
      color: var(--text-color-primary);
      gap: 15px;
    }
    .header-title img {
      width: 36px;
      height: 36px;
    }

    /* --- PC・スマホ共通 カードレイアウト --- */
    #traffic-view {
      width: 100%;
      max-width: 1000px;
      display: block;
    }
    
    .traffic-grid { 
      display: grid; 
      /* 画面幅に合わせて自動でカラム数を調整（PCなら複数列、スマホなら1列） */
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
      gap: 20px; 
      justify-content: center;
    }

    .app-card { 
      display: flex; 
      flex-direction: row; 
      background-color: var(--card-bg); 
      border: var(--card-border); 
      border-radius: var(--card-radius); 
      overflow: hidden; 
      min-height: 110px; 
      height: auto;
      text-decoration: none; 
      color: var(--text-color-primary); 
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .app-card:hover { 
      transform: translateY(-4px);
      box-shadow: 0 8px 16px rgba(0,0,0,0.5); 
    }

    .card-left { 
      width: 30%; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      background-color: rgba(255,255,255,0.03); 
    }
    .card-left i { 
      font-size: 38px; 
      color: var(--tab-active-bg); 
    }

    .card-divider { 
      width: 2px; 
      background-color: var(--divider-color); 
      margin: 15px 0; 
      border-radius: 2px; 
    }

    .card-right { 
      width: 70%; 
      display: flex; 
      flex-direction: column;
      align-items: center; 
      justify-content: center; 
      padding: 15px 10px; 
      box-sizing: border-box; 
    }
    .card-title { 
      font-size: 16px; 
      font-weight: bold; 
      text-align: center; 
      line-height: 1.3;
      margin-bottom: 6px;
    }
    .card-details {
      font-size: 11px;
      color: var(--text-color-secondary);
      text-align: center;
      line-height: 1.4;
    }

    /* --- ロード中モーダルのスタイル --- */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(5px);
      display: none; /* 初期は非表示 */
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .loading-box {
      background-color: var(--card-bg);
      border: var(--card-border);
      border-radius: var(--card-radius);
      padding: 40px 30px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .loading-text {
      font-size: 22px;
      font-weight: bold;
      color: var(--text-color-primary);
      margin-bottom: 10px;
    }
    /* 追加：何を開いているかのテキスト */
    .loading-target-text {
      font-size: 16px;
      color: var(--tab-active-bg);
      margin-bottom: 25px;
      font-weight: bold;
    }
    
    .progress-container {
      width: 100%;
      height: 12px;
      background-color: var(--input-bg);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 30px;
      border: 1px solid var(--divider-color);
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background-color: var(--tab-active-bg);
      transition: width 0.05s linear; /* なめらかに伸びる */
    }
    .cancel-btn {
      background-color: transparent;
      color: #ff6b6b;
      border: 2px solid #ff6b6b;
      padding: 10px 30px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .cancel-btn:hover {
      background-color: #ff6b6b;
      color: #fff;
    }

    /* --- 戻るボタン --- */
    .back-btn-wrapper {
      margin-top: 50px;
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      width: 100%;
    }
    
    .back-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 40px;
      background-color: var(--tab-active-bg);
      color: #ffffff;
      font-size: 18px;
      font-weight: bold;
      text-decoration: none;
      border-radius: 50px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    
    .back-btn i {
      margin-right: 12px;
      font-size: 22px;
    }
    
    .back-btn:hover {
      background-color: #357abd;
      transform: translateY(-3px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.5);
    }
    
    /* スクロールバーのカスタマイズ */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--divider-color);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-color-secondary);
    }
  </style>
</head>
<body>

  <!-- コンテンツ全体をセンタリングするためのラッパー -->
  <div class="container">
  
    <!-- タイトルとファビコン -->
    <div class="header-title">
      <img src="B-favi.png" alt="favicon">
      <span>B-train</span>
    </div>

    <!-- PC・スマホ共通のカードリスト -->
    <div id="traffic-view">
        <div id="mobile-traffic-all" class="traffic-grid">
            <a href="train/wadmisaki-train.html" target="_blank" class="app-card">
                <div class="card-left"><i class="fas fa-subway"></i></div>
                <div class="card-divider"></div>
                <div class="card-right">
                    <div class="card-title">電車一覧</div>
                    <div class="card-details">(西・山手線)板宿、(海岸線)新長田、和田岬、ハーバーランド、三宮、(京阪線)京橋、寝屋川</div>
                </div>
            </a>
            <a href="bus/Buslocation.html" target="_blank" class="app-card">
                <div class="card-left"><i class="fas fa-map-marked-alt"></i></div>
                <div class="card-divider"></div>
                <div class="card-right">
                    <div class="card-title">神戸市バスロケーション</div>
                    <div class="card-details">夢野町3丁目、宮川町9丁目、中山手3丁目（神戸北野ノスタ）、鷹取団地前、育英高校前、三宮駅前、新開地</div>
                </div>
            </a>
            <a href="bus/imadezaike.html" target="_blank" class="app-card">
                <div class="card-left"><i class="fas fa-bus-alt"></i></div>
                <div class="card-divider"></div>
                <div class="card-right">
                    <div class="card-title">神戸市バス一覧</div>
                    <div class="card-details">和田岬、今出在家町、県立兵庫津M前、中央市場</div>
                </div>
            </a>
        </div>
    </div>

    <!-- 下部リンクボタン -->
    <div class="back-btn-wrapper">
        <a href="https://supertasu.github.io/" class="back-btn">
            <i class="fas fa-home"></i> Link FIrstに戻る
        </a>
    </div>

  </div> <!-- /container -->

  <!-- ロード中画面（モーダル） -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-box">
      <div class="loading-text">ロード中...</div>
      <!-- 追加：開こうとしているタイトルを表示する場所 -->
      <div id="loading-target-text" class="loading-target-text"></div>
      
      <div class="progress-container">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
      <button id="cancel-btn" class="cancel-btn">
        <i class="fas fa-times"></i> キャンセル
      </button>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const overlay = document.getElementById('loading-overlay');
      const progressBar = document.getElementById('progress-bar');
      const cancelBtn = document.getElementById('cancel-btn');
      const loadingTargetText = document.getElementById('loading-target-text'); // 追加
      
      let loadTimeout;
      let progressInterval;
      
      const appCards = document.querySelectorAll('.app-card');
      
      appCards.forEach(card => {
        card.addEventListener('click', function(e) {
          e.preventDefault(); // クリックした瞬間の移動を無効化
          
          const url = this.getAttribute('href');
          const target = this.getAttribute('target');
          
          // 追加：クリックしたカードのタイトルを取得して表示
          const title = this.querySelector('.card-title').textContent;
          loadingTargetText.textContent = `「${title}」を開いています`;
          
          // モーダルとプログレスバーを初期化して表示
          overlay.style.display = 'flex';
          progressBar.style.width = '0%';
          
          let progress = 0;
          const totalTime = 1000; // 1秒 (1000ミリ秒)
          const intervalTime = 20; // 20ミリ秒ごとに更新
          const step = (intervalTime / totalTime) * 100;
          
          // プログレスバーのアニメーションを実行
          progressInterval = setInterval(() => {
            progress += step;
            if (progress >= 100) progress = 100;
            progressBar.style.width = progress + '%';
          }, intervalTime);
          
          // 1秒後に指定されたURLへ遷移
          loadTimeout = setTimeout(() => {
            clearInterval(progressInterval);
            overlay.style.display = 'none';
            
            // target="_blank" の場合は新しいタブで開く
            if (target === '_blank') {
              window.open(url, '_blank');
            } else {
              window.location.href = url;
            }
          }, totalTime);
        });
      });
      
      // キャンセルボタンを押した時の処理
      cancelBtn.addEventListener('click', () => {
        clearTimeout(loadTimeout); // ページ遷移を中止
        clearInterval(progressInterval); // バーの進行を中止
        overlay.style.display = 'none'; // モーダルを非表示
      });
    });
  </script>
</body>
</html>
