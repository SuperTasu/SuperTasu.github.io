<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* 親ページとデザインを同期するための共通変数 */
    :root {
      --bg-color: transparent;
      --text-color-primary: #000000;
      --text-color-secondary: #444444;
      --card-bg: #ffffff;
      --card-border: 2px solid #000000;
      --card-radius: 28px;
      --divider-color: #ccc;
      --tab-active-bg: #667eea;
      --input-bg: #f0f0f0;
      --swap-select-color: rgba(33, 150, 243, 0.2);
    }
    body.dark-theme {
      --text-color-primary: #f5f5f5;
      --text-color-secondary: #aaa;
      --card-bg: #333;
      --card-border: 2px solid #aaaaaa;
      --divider-color: #555;
      --tab-active-bg: #88aaff;
      --input-bg: #3a3a3a;
      --swap-select-color: rgba(100, 181, 246, 0.3);
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text-color-primary);
      background-color: var(--bg-color);
      transition: color 0.3s;
      padding-bottom: 20px;
    }
    
    /* カードのレイアウト */
    .traffic-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; padding: 10px; }
    @media (max-width: 1300px) { .traffic-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 900px) { .traffic-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 650px) { .traffic-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 400px) { .traffic-grid { grid-template-columns: repeat(1, 1fr); } }

    .app-card { display: flex; flex-direction: row; background-color: var(--card-bg); border: var(--card-border); border-radius: var(--card-radius); overflow: hidden; height: 90px; position: relative; cursor: pointer; text-decoration: none; color: var(--text-color-primary); }
    .app-card:hover { box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .card-left { width: 40%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .card-left i { font-size: 32px; color: var(--text-color-secondary); }
    .card-divider { width: 2px; background-color: var(--divider-color); margin: 10px 0; border-radius: 2px; }
    .card-right { width: 60%; display: flex; flex-direction: column; justify-content: center; padding: 5px 10px; box-sizing: border-box; overflow: hidden; align-items: center; }
    .card-title { font-size: 14px; font-weight: bold; color: var(--text-color-primary); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.3; border-bottom: 2px solid var(--text-color-primary); padding-bottom: 2px; text-align: center; }
    
    /* PC版レイアウト */
    #traffic-pc-view { display: none; }
    #traffic-mobile-view { display: block; }
    @media (min-width: 1000px) {
        #traffic-mobile-view { display: none; }
        #traffic-pc-view { display: flex; width: 100%; height: calc(100vh - 120px); border: 2px solid var(--text-color-primary); box-sizing: border-box; background: var(--card-bg); border-radius: 12px; overflow: hidden; }
        .pc-traffic-display { flex-grow: 1; border-right: 2px solid var(--text-color-primary); position: relative; background: #fff; display: flex; flex-direction: column; }
        .pc-display-header { height: 40px; background: var(--tab-active-bg); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; }
        .pc-traffic-display iframe { width: 100%; flex-grow: 1; border: none; }
        .pc-placeholder { position: absolute; top:50%; left:50%; transform:translate(-50%, -50%); color: #888; font-weight: bold; text-align: center; }
        .pc-traffic-sidebar { width: 320px; display: flex; flex-direction: column; background: var(--card-bg); flex-shrink: 0; position: relative; }
        .pc-sidebar-header { padding: 10px; display: flex; flex-direction: column; align-items: center; border-bottom: 1px solid var(--divider-color); }
        .scroll-arrow { font-size: 24px; color: var(--text-color-secondary); cursor: pointer; width: 100%; text-align: center; margin-bottom: 5px; }
        .scroll-arrow:hover { color: var(--text-color-primary); }
        .pc-traffic-list { flex-grow: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .pc-traffic-item { border: 1px solid var(--text-color-primary); border-radius: 15px; height: 70px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: all 0.2s; padding: 0 15px; font-weight: bold; font-size: 13px; background: var(--card-bg); color: var(--text-color-primary); }
        .pc-traffic-item:hover { background: var(--swap-select-color); }
        .pc-traffic-item.active { background: var(--input-bg); border: 2px solid var(--tab-active-bg); }
        .pc-item-label { flex-grow: 1; text-align: left; }
        .pc-new-tab-btn { background: transparent; border: none; color: var(--text-color-secondary); font-size: 16px; cursor: pointer; padding: 8px; border-radius: 50%; transition: background 0.2s; display: flex; align-items: center; justify-content: center; }
        .pc-new-tab-btn:hover { background: rgba(0,0,0,0.1); color: var(--tab-active-bg); }
        .pc-sidebar-footer { padding: 5px; text-align: center; border-top: 1px solid var(--divider-color); }
    }
  </style>
</head>
<!-- 初期状態で常にダークモードにするため class="dark-theme" を追加 -->
<body class="dark-theme">
    
    <!-- 修正1: 一番上にタイトルとファビコンアイコンを追加 -->
    <div style="text-align: center; font-size: 24px; font-weight: bold; margin: 15px 0;">
        <!-- favicon.ico のパスは必要に応じて変更してください -->
        <img src="favicon.ico" alt="favicon" style="width: 24px; height: 24px; vertical-align: middle; margin-right: 10px;">
        <span style="vertical-align: middle;">B-train</span>
    </div>

    <!-- モバイル版 -->
    <div id="traffic-mobile-view">
        <div id="mobile-traffic-all" class="traffic-grid">
            <a href="train/wadmisaki-train.html" target="_blank" class="app-card traffic-card"><div class="card-left"><i class="fas fa-subway"></i></div><div class="card-divider"></div><div class="card-right"><div class="card-title">電車一覧</div></div></a>
            <a href="bus/Buslocation.html" target="_blank" class="app-card traffic-card"><div class="card-left"><i class="fas fa-map-marked-alt"></i></div><div class="card-divider"></div><div class="card-right"><div class="card-title">バスロケーション</div></div></a>
            <a href="bus/imadezaike.html" target="_blank" class="app-card traffic-card"><div class="card-left"><i class="fas fa-bus-alt"></i></div><div class="card-divider"></div><div class="card-right"><div class="card-title">バス時刻一覧</div></div></a>
        </div>
    </div>

    <!-- PC版 -->
    <div id="traffic-pc-view">
        <div class="pc-traffic-display">
            <div class="pc-display-header" id="pc-header-title">Select Info</div>
            <div class="pc-placeholder" id="pc-placeholder-msg">リストから選択してください</div>
            <iframe id="pc-main-iframe" src=""></iframe>
        </div>
        <div class="pc-traffic-sidebar">
            <div class="pc-sidebar-header">
                <div class="scroll-arrow" onclick="scrollTrafficList(-50)"><i class="fas fa-chevron-up"></i></div>
            </div>
            <div id="pc-list-all" class="pc-traffic-list">
                <div class="pc-traffic-item">
                    <span class="pc-item-label" onclick="loadPcTraffic('train/wadmisaki-train.html', this, '🚃電車一覧')">電車一覧</span>
                    <button class="pc-new-tab-btn" onclick="openNewTab('train/wadmisaki-train.html', event)" title="新しいタブで開く"><i class="fas fa-external-link-alt"></i></button>
                </div>
                <div class="pc-traffic-item">
                    <span class="pc-item-label" onclick="loadPcTraffic('bus/Buslocation.html', this, '🚌バスロケーション')">バスロケーション</span>
                    <button class="pc-new-tab-btn" onclick="openNewTab('bus/Buslocation.html', event)" title="新しいタブで開く"><i class="fas fa-external-link-alt"></i></button>
                </div>
                <div class="pc-traffic-item">
                    <span class="pc-item-label" onclick="loadPcTraffic('bus/imadezaike.html', this, '🚌バス時刻一覧')">バス時刻一覧</span>
                    <button class="pc-new-tab-btn" onclick="openNewTab('bus/imadezaike.html', event)" title="新しいタブで開く"><i class="fas fa-external-link-alt"></i></button>
                </div>
            </div>
            <div class="pc-sidebar-footer">
                <div class="scroll-arrow" onclick="scrollTrafficList(50)"><i class="fas fa-chevron-down"></i></div>
            </div>
        </div>
    </div>

    <!-- 修正2: 一番下に指定されたボタンを追加 -->
    <div style="text-align: center; margin-top: 30px; margin-bottom: 20px;">
        <a href="https://supertasu.github.io/" style="display: inline-block; padding: 12px 30px; background-color: var(--input-bg); color: var(--text-color-primary); border: 2px solid var(--text-color-primary); border-radius: 20px; text-decoration: none; font-weight: bold; transition: 0.2s;" onmouseover="this.style.background='var(--swap-select-color)'" onmouseout="this.style.background='var(--input-bg)'">
            Link FIrstに戻る
        </a>
    </div>

    <script>
        // PC版 iframe読み込み処理
        function loadPcTraffic(url, labelElement, title) {
            const iframe = document.getElementById('pc-main-iframe');
            const placeholder = document.getElementById('pc-placeholder-msg');
            const headerTitle = document.getElementById('pc-header-title');
            placeholder.style.display = 'none';
            iframe.src = url;
            if(title) headerTitle.textContent = title;
            document.querySelectorAll('.pc-traffic-item').forEach(el => el.classList.remove('active'));
            if(labelElement && labelElement.parentElement) labelElement.parentElement.classList.add('active');
        }

        // 新しいタブで開く
        function openNewTab(url, event) {
            event.stopPropagation();
            window.open(url, '_blank');
        }

        // リストスクロール
        function scrollTrafficList(amount) {
            const activeList = document.querySelector('.pc-traffic-list');
            if(activeList) activeList.scrollBy({ top: amount, behavior: 'smooth' });
        }

        // 修正3: 親のテーマに関わらず中身を常にダークモードにするため、同期処理を無効化（コメントアウト）しています。
        /*
        function syncTheme() {
            try {
                if (window.parent && window.parent.document.body.classList.contains('dark-theme')) {
                    document.body.classList.add('dark-theme');
                } else {
                    document.body.classList.remove('dark-theme');
                }
            } catch(e) {}
        }
        syncTheme();
        setInterval(syncTheme, 500);
        */
    </script>
</body>
</html>
