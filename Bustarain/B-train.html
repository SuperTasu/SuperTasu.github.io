<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* 常にダークモードとし、見やすく調整した変数 */
    :root {
      --bg-color: #121212;
      --text-color-primary: #ffffff;
      --text-color-secondary: #bbbbbb;
      --card-bg: #1e1e1e;
      --card-border: 2px solid #333333;
      --card-radius: 20px;
      --divider-color: #444444;
      --tab-active-bg: #4a90e2; /* アクセントカラー（青） */
      --input-bg: #2a2a2a;
      --swap-select-color: rgba(74, 144, 226, 0.2);
    }

    /* 背景と全体の中央揃え */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text-color-primary);
      background-color: var(--bg-color);
      display: flex;
      justify-content: center; /* 全体を中央に */
      min-height: 100vh;
      box-sizing: border-box;
    }

    /* コンテンツをまとめるラッパー */
    .container {
      width: 100%;
      max-width: 1200px;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      align-items: center; /* コンテンツ内も中央揃え */
      box-sizing: border-box;
    }

    /* タイトルとファビコン */
    .header-title {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 40px;
      color: var(--text-color-primary);
      gap: 15px;
    }
    .header-title img {
      width: 36px;
      height: 36px;
    }

    /* --- モバイル版（カード）のレイアウト --- */
    #traffic-mobile-view {
      width: 100%;
      max-width: 1000px;
      display: block;
    }
    
    .traffic-grid { 
      display: grid; 
      /* 画面幅に合わせて自動でカラム数を調整し、中央に配置 */
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
      gap: 20px; 
      justify-content: center;
    }

    .app-card { 
      display: flex; 
      flex-direction: row; 
      background-color: var(--card-bg); 
      border: var(--card-border); 
      border-radius: var(--card-radius); 
      overflow: hidden; 
      height: 100px; /* タップしやすい高さ */
      text-decoration: none; 
      color: var(--text-color-primary); 
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .app-card:hover { 
      transform: translateY(-4px);
      box-shadow: 0 8px 16px rgba(0,0,0,0.5); 
    }

    .card-left { 
      width: 35%; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      background-color: rgba(255,255,255,0.03); /* 少し背景を変えて境界をわかりやすく */
    }
    .card-left i { 
      font-size: 38px; 
      color: var(--tab-active-bg); /* アイコンをアクセントカラーに */
    }

    .card-divider { 
      width: 2px; 
      background-color: var(--divider-color); 
      margin: 15px 0; 
      border-radius: 2px; 
    }

    .card-right { 
      width: 65%; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      padding: 10px; 
      box-sizing: border-box; 
    }
    .card-title { 
      font-size: 18px; 
      font-weight: bold; 
      text-align: center; 
      line-height: 1.4;
    }
    
    /* --- PC版レイアウト --- */
    #traffic-pc-view { 
      display: none; 
    }
    
    @media (min-width: 1000px) {
        #traffic-mobile-view { display: none; }
        #traffic-pc-view { 
            display: flex; 
            width: 100%; 
            max-width: 1000px;
            height: 60vh; 
            min-height: 500px;
            border: var(--card-border); 
            box-sizing: border-box; 
            background: var(--card-bg); 
            border-radius: var(--card-radius); 
            overflow: hidden; 
        }
        
        .pc-traffic-display { 
            flex-grow: 1; 
            border-right: var(--card-border); 
            position: relative; 
            background: #ffffff; /* 外部サイト（時刻表など）が見やすいように白背景を維持 */
            display: flex; 
            flex-direction: column; 
        }
        
        .pc-display-header { 
            height: 50px; 
            background: var(--tab-active-bg); 
            color: #ffffff; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            font-size: 18px; 
        }
        
        .pc-traffic-display iframe { 
            width: 100%; 
            flex-grow: 1; 
            border: none; 
        }
        
        .pc-placeholder { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            color: #888888; 
            font-weight: bold; 
            font-size: 18px;
            text-align: center; 
        }
        
        .pc-traffic-sidebar { 
            width: 320px; 
            display: flex; 
            flex-direction: column; 
            background: var(--card-bg); 
            flex-shrink: 0; 
        }
        
        .pc-sidebar-header, .pc-sidebar-footer { 
            padding: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        .scroll-arrow { 
            font-size: 28px; 
            color: var(--text-color-secondary); 
            cursor: pointer; 
            transition: color 0.2s;
        }
        .scroll-arrow:hover { 
            color: var(--tab-active-bg); 
        }
        
        .pc-traffic-list { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 0 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        
        .pc-traffic-item { 
            border: 1px solid var(--divider-color); 
            border-radius: 15px; 
            height: 70px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            cursor: pointer; 
            transition: all 0.2s; 
            padding: 0 20px; 
            font-weight: bold; 
            font-size: 16px; 
            background: var(--input-bg); 
            color: var(--text-color-primary); 
        }
        .pc-traffic-item:hover { 
            background: var(--swap-select-color); 
            border-color: var(--tab-active-bg);
        }
        .pc-traffic-item.active { 
            background: var(--swap-select-color); 
            border: 2px solid var(--tab-active-bg); 
        }
        
        .pc-item-label { 
            flex-grow: 1; 
            text-align: left; 
        }
        
        .pc-new-tab-btn { 
            background: transparent; 
            border: none; 
            color: var(--text-color-secondary); 
            font-size: 18px; 
            cursor: pointer; 
            padding: 10px; 
            border-radius: 50%; 
            transition: all 0.2s; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .pc-new-tab-btn:hover { 
            background: rgba(255,255,255,0.1); 
            color: var(--tab-active-bg); 
        }
    }

    /* --- 戻るボタン --- */
    .back-btn-wrapper {
      margin-top: 50px;
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      width: 100%;
    }
    
    .back-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 40px;
      background-color: var(--tab-active-bg);
      color: #ffffff;
      font-size: 18px;
      font-weight: bold;
      text-decoration: none;
      border-radius: 50px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    
    .back-btn i {
      margin-right: 12px;
      font-size: 22px;
    }
    
    .back-btn:hover {
      background-color: #357abd; /* ホバー時に少し濃い青にする */
      transform: translateY(-3px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.5);
    }
    
    /* スクロールバーのカスタマイズ (見やすく) */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--divider-color);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-color-secondary);
    }
  </style>
</head>
<body>

  <!-- コンテンツ全体をセンタリングするためのラッパー -->
  <div class="container">
  
    <!-- タイトルとファビコン -->
    <div class="header-title">
      <!-- faviconのパスが異なる場合は src の中身を変更してください -->
      <img src="favicon.ico" alt="favicon">
      <span>B-train</span>
    </div>

    <!-- モバイル版 -->
    <div id="traffic-mobile-view">
        <div id="mobile-traffic-all" class="traffic-grid">
            <a href="train/wadmisaki-train.html" target="_blank" class="app-card">
                <div class="card-left"><i class="fas fa-subway"></i></div>
                <div class="card-divider"></div>
                <div class="card-right"><div class="card-title">電車一覧</div></div>
            </a>
            <a href="bus/Buslocation.html" target="_blank" class="app-card">
                <div class="card-left"><i class="fas fa-map-marked-alt"></i></div>
                <div class="card-divider"></div>
                <div class="card-right"><div class="card-title">バスロケーション</div></div>
            </a>
            <a href="bus/imadezaike.html" target="_blank" class="app-card">
                <div class="card-left"><i class="fas fa-bus-alt"></i></div>
                <div class="card-divider"></div>
                <div class="card-right"><div class="card-title">バス時刻一覧</div></div>
            </a>
        </div>
    </div>

    <!-- PC版 -->
    <div id="traffic-pc-view">
        <div class="pc-traffic-display">
            <div class="pc-display-header" id="pc-header-title">Select Info</div>
            <div class="pc-placeholder" id="pc-placeholder-msg">リストから選択してください</div>
            <iframe id="pc-main-iframe" src=""></iframe>
        </div>
        <div class="pc-traffic-sidebar">
            <div class="pc-sidebar-header">
                <div class="scroll-arrow" onclick="scrollTrafficList(-50)" title="上へスクロール"><i class="fas fa-chevron-up"></i></div>
            </div>
            <div id="pc-list-all" class="pc-traffic-list">
                <div class="pc-traffic-item">
                    <span class="pc-item-label" onclick="loadPcTraffic('train/wadmisaki-train.html', this, '🚃電車一覧')">電車一覧</span>
                    <button class="pc-new-tab-btn" onclick="openNewTab('train/wadmisaki-train.html', event)" title="新しいタブで開く"><i class="fas fa-external-link-alt"></i></button>
                </div>
                <div class="pc-traffic-item">
                    <span class="pc-item-label" onclick="loadPcTraffic('bus/Buslocation.html', this, '🚌バスロケーション')">バスロケーション</span>
                    <button class="pc-new-tab-btn" onclick="openNewTab('bus/Buslocation.html', event)" title="新しいタブで開く"><i class="fas fa-external-link-alt"></i></button>
                </div>
                <div class="pc-traffic-item">
                    <span class="pc-item-label" onclick="loadPcTraffic('bus/imadezaike.html', this, '🚌バス時刻一覧')">バス時刻一覧</span>
                    <button class="pc-new-tab-btn" onclick="openNewTab('bus/imadezaike.html', event)" title="新しいタブで開く"><i class="fas fa-external-link-alt"></i></button>
                </div>
            </div>
            <div class="pc-sidebar-footer">
                <div class="scroll-arrow" onclick="scrollTrafficList(50)" title="下へスクロール"><i class="fas fa-chevron-down"></i></div>
            </div>
        </div>
    </div>

    <!-- 下部リンクボタン -->
    <div class="back-btn-wrapper">
        <a href="https://supertasu.github.io/" class="back-btn">
            <i class="fas fa-home"></i> Link FIrstに戻る
        </a>
    </div>

  </div> <!-- /container -->

  <script>
      // PC版 iframe読み込み処理
      function loadPcTraffic(url, labelElement, title) {
          const iframe = document.getElementById('pc-main-iframe');
          const placeholder = document.getElementById('pc-placeholder-msg');
          const headerTitle = document.getElementById('pc-header-title');
          
          placeholder.style.display = 'none';
          iframe.src = url;
          if(title) headerTitle.textContent = title;
          
          document.querySelectorAll('.pc-traffic-item').forEach(el => el.classList.remove('active'));
          if(labelElement && labelElement.parentElement) labelElement.parentElement.classList.add('active');
      }

      // 新しいタブで開く
      function openNewTab(url, event) {
          event.stopPropagation();
          window.open(url, '_blank');
      }

      // リストスクロール
      function scrollTrafficList(amount) {
          const activeList = document.querySelector('.pc-traffic-list');
          if(activeList) activeList.scrollBy({ top: amount, behavior: 'smooth' });
      }
  </script>
</body>
</html>
